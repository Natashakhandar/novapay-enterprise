groups:
- name: banking-transaction-alerts
  rules:
  - alert: CriticalPaymentFailureRate
    expr: sum(rate(http_requests_total{status="500", service="novapay-payments-canary"}[5m])) / sum(rate(http_requests_total{service="novapay-payments-canary"}[5m])) > 0.05
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "Canary Error Rate > 5% - Rollback Imminent"
  
  - alert: HighLatency
    expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 2.0
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "P99 Latency > 2s for Payments API"
