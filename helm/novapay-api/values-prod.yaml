replicaCount: 3

image:
  repository: ecr.aws/novapay/payments
  tag: "1.0.0" # Controlled by CI/CD
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

config:
  logLevel: INFO
  dbHost: aurora.prod.internal
